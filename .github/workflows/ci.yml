name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: supabase/setup-cli@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt
          npm ci

      - name: Start local Supabase and apply migrations
        run: |
          supabase start
          supabase db reset

      - name: Configure local test environment
        shell: bash
        run: |
          set -euo pipefail
          eval "$(supabase status -o env)"

          cat > apps/api/.env <<EOF
          SUPABASE_URL=$API_URL
          SUPABASE_DB_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          SUPABASE_JWT_SECRET=$JWT_SECRET
          CORS_ALLOW_ORIGINS=http://127.0.0.1:3000,http://localhost:3000
          APP_ENV=test
          EOF

          cat > apps/web/.env.local <<EOF
          NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
          NEXT_PUBLIC_SUPABASE_URL=$API_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY
          EOF

      - name: Run backend tests
        working-directory: apps/api
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/api
        run: python -m pytest tests/ -q

      - name: Run frontend unit tests
        run: npm run test --workspace=@smart-expense/web

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Start API for browser acceptance tests
        working-directory: apps/api
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > "$RUNNER_TEMP/api.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/api.pid"

      - name: Run frontend acceptance tests
        working-directory: apps/web
        run: npx playwright test e2e --workers=1

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: ignore
          path: |
            apps/web/test-results
            apps/web/playwright-report
            ${{ runner.temp }}/api.log
