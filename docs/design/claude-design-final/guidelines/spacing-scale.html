<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4 / 8 / 12 / 16 / 24 / 32 / 48px" name="Spacing Scale" -->
<link rel="stylesheet" href="../styles.css">
<div style="padding:16px;display:flex;align-items:flex-end;gap:10px;font-family:var(--font-arabic);direction:rtl">
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-1);height:var(--space-1);background:var(--color-primary)"></div><span style="font-size:11px;color:var(--color-text-muted)">4</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-2);height:var(--space-2);background:var(--color-primary)"></div><span style="font-size:11px;color:var(--color-text-muted)">8</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-3);height:var(--space-3);background:var(--color-primary)"></div><span style="font-size:11px;color:var(--color-text-muted)">12</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-4);height:var(--space-4);background:var(--color-primary)"></div><span style="font-size:11px;color:var(--color-text-muted)">16</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-6);height:var(--space-6);background:var(--color-primary)"></div><span style="font-size:11px;color:var(--color-text-muted)">24</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-8);height:var(--space-8);background:var(--color-primary)"></div><span style="font-size:11px;color:var(--color-text-muted)">32</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-12);height:var(--space-12);background:var(--color-primary)"></div><span style="font-size:11px;color:var(--color-text-muted)">48</span></div>
</div>
