<!-- @dsCard group="Colors" viewport="700x150" subtitle="Income, expense, pending, informational states" name="Semantic Colors" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;gap:8px;padding:12px;font-family:var(--font-arabic);direction:rtl">
<div style="flex:1;height:110px;border-radius:10px;background:var(--color-income-subtle);border:1px solid var(--color-income-border);display:flex;flex-direction:column;justify-content:space-between;padding:8px"><div style="width:20px;height:20px;border-radius:99px;background:var(--color-income)"></div><span style="font-size:12px;color:var(--color-income)">دخل / نجاح</span></div>
<div style="flex:1;height:110px;border-radius:10px;background:var(--color-expense-subtle);border:1px solid var(--color-expense-border);display:flex;flex-direction:column;justify-content:space-between;padding:8px"><div style="width:20px;height:20px;border-radius:99px;background:var(--color-expense)"></div><span style="font-size:12px;color:var(--color-expense)">مصروف / حذف</span></div>
<div style="flex:1;height:110px;border-radius:10px;background:var(--color-warning-subtle);border:1px solid var(--color-warning-border);display:flex;flex-direction:column;justify-content:space-between;padding:8px"><div style="width:20px;height:20px;border-radius:99px;background:var(--color-warning)"></div><span style="font-size:12px;color:#92620A">قيد الانتظار</span></div>
<div style="flex:1;height:110px;border-radius:10px;background:var(--color-info-subtle);border:1px solid var(--color-info-border);display:flex;flex-direction:column;justify-content:space-between;padding:8px"><div style="width:20px;height:20px;border-radius:99px;background:var(--color-info)"></div><span style="font-size:12px;color:var(--color-info)">معلومات</span></div>
</div>
